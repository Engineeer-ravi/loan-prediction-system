{% extends "base.html" %}
{% set page_title = "Apply Loan" %}
{% set page_heading = "Loan Application" %}

{% block content %}
<section class="card">
  <h3>Eligibility Form</h3>
  <form class="loan-form" action="{{ url_for('loan_application') }}" method="POST">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <div class="form-grid">
      <label>First Name<input type="text" name="first_name" required></label>
      <label>Middle Initial<input type="text" name="middle_initial" maxlength="1"></label>
      <label>Last Name<input type="text" name="last_name" required></label>
      <label>Email<input type="email" name="email" required></label>
      <label>Contact Number<input type="tel" name="telephone" pattern="[0-9+\-\s]{7,15}" required></label>
      <label>Home Address<input type="text" name="home_address" required></label>

      <label>Gender
        <select name="gender" required>
          <option value="" selected disabled>Select</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </label>

      <label>Education
        <select name="education" required>
          <option value="" selected disabled>Select</option>
          <option value="Graduate">Graduate</option>
          <option value="Not Graduate">Not Graduate</option>
        </select>
      </label>

      <label>Marital Status
        <select name="married" required>
          <option value="" selected disabled>Select</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </label>

      <label>Dependents
        <select name="dependents" required>
          <option value="" selected disabled>Select</option>
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3+">3+</option>
        </select>
      </label>

      <label>Employment Status
        <select name="employed" required>
          <option value="" selected disabled>Select</option>
          <option value="Yes">Employed</option>
          <option value="No">Unemployed</option>
        </select>
      </label>

      <label>Employer Name<input type="text" name="company_name" required></label>
      <label>Current Salary<input type="number" name="ApplicantIncome" min="1" step="any" required></label>

      <label>Credit Score
        <select name="credit" required>
          <option value="" selected disabled>Select</option>
          <option value="1.000000">1.000000</option>
          <option value="0.842199">0.842199</option>
          <option value="0.000000">0.000000</option>
        </select>
      </label>

      <label>Spouse Name<input type="text" name="spouse"></label>
      <label>Spouse Employment
        <select name="spouse_employed">
          <option value="" selected disabled>Select</option>
          <option value="Yes">Employed</option>
          <option value="No">Unemployed</option>
        </select>
      </label>
      <label>Spouse Employer<input type="text" name="spouse_company_name"></label>
      <label>Spouse Salary<input type="number" name="CoapplicantIncome" min="0" step="any" required></label>

      <label>Property Location
        <select name="area" required>
          <option value="" selected disabled>Select</option>
          <option value="Urban">Urban</option>
          <option value="Semiurban">Semiurban</option>
          <option value="Rural">Rural</option>
        </select>
      </label>

      <label>Loan Category
        <select name="loan_category" required>
          <option value="" selected disabled>Select</option>
          {% for category in loan_categories %}
          <option value="{{ category }}">{{ category }}</option>
          {% endfor %}
        </select>
      </label>

      <label>Loan Amount<input type="number" name="LoanAmount" min="1" step="any" required></label>
      <label>Loan Term (months)<input type="number" name="Loan_Amount_Term" min="1" step="1" required></label>
      <label class="full">Declaration<textarea name="declaration" rows="3" required></textarea></label>
    </div>

    <button class="btn primary" type="submit">Submit Application</button>
  </form>
</section>
{% endblock %}
