<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - LoanHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=style_version) }}">
</head>
<body class="auth-body">
  <section class="auth-shell">
    <article class="auth-card">
      <h1>Create Account</h1>
      <p>Start your secure loan application journey.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="alerts">
        {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('register') }}" class="stack-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <label for="name">Full Name</label>
        <input id="name" type="text" name="name" required>

        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" minlength="8" required>

        <button type="submit" class="btn primary full">Register</button>
      </form>

      <p class="muted">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
    </article>
  </section>
</body>
</html>
